<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Performance Predictor</title>
    <link rel="stylesheet" href="style.css?v=11">
</head>
<body>

    <h1>Performance Predictor</h1>

    <div class="task-box">
        <input type="number" id="hours" placeholder="Study hours/day">
        <input type="number" id="days" placeholder="Days studied/week">
        <input type="number" id="sleep" placeholder="Sleep hours">
        <input type="number" id="assign" placeholder="Assignments %">
        <input type="number" id="attend" placeholder="Attendance %">

        <button onclick="predict()">Predict</button>
    </div>

    <div id="resultBox" class="result-box" style="display:none;">
        <h3 id="scoreText"></h3>
        <p id="suggestionText"></p>

        <canvas id="scoreChart"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    
    <script src="performance.js?v=11"></script>

</body>
</html>
